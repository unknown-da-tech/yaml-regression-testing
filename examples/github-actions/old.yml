name: App CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    if: "github.ref == 'refs/heads/main'"
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy application
        run: ./deploy.sh